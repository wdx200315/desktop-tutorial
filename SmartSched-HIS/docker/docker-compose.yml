version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: smartsched-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartsched}
      MYSQL_USER: ${MYSQL_USER:-smartsched}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-smartsched_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - smartsched-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 服务端
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: smartsched-server
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8888:8888"
      - "8889:8889"  # 监控端口
    volumes:
      - ./server.json:/etc/smartsched/server.json:ro
      - server_logs:/var/log/smartsched
    networks:
      - smartsched-net
    environment:
      - TZ=Asia/Shanghai

  # 患者终端 (触控挂号机)
  patient-terminal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: smartsched-patient
    restart: always
    depends_on:
      - server
    networks:
      - smartsched-net
    environment:
      - ROLE=patient
      - SERVER_HOST=server
    volumes:
      - ./client-patient.json:/etc/smartsched/client.json:ro
    command: ["/opt/smartsched/bin/smartsched-patient"]

  # 医生工作站
  doctor-workstation:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: smartsched-doctor
    restart: always
    depends_on:
      - server
    networks:
      - smartsched-net
    environment:
      - ROLE=doctor
      - SERVER_HOST=server
    volumes:
      - ./client-doctor.json:/etc/smartsched/client.json:ro
    command: ["/opt/smartsched/bin/smartsched-doctor"]

  # 排队叫号看板
  display-board:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: smartsched-display
    restart: always
    depends_on:
      - server
    networks:
      - smartsched-net
    environment:
      - ROLE=display
      - SERVER_HOST=server
    volumes:
      - ./client-display.json:/etc/smartsched/client.json:ro
    command: ["/opt/smartsched/bin/smartsched-display"]

  # 管理后台 (Web)
  admin-web:
    image: nginx:alpine
    container_name: smartsched-admin
    restart: always
    depends_on:
      - server
    ports:
      - "8080:80"
    networks:
      - smartsched-net
    volumes:
      - ./admin-html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 监控面板 (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: smartsched-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smartsched-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: smartsched-grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - smartsched-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

# 网络
networks:
  smartsched-net:
    driver: bridge

# 卷
volumes:
  mysql_data:
  server_logs:
  prometheus_data:
  grafana_data:
