# SmartSched-HIS 配置文件

# =============================================================================
# 服务端配置
# =============================================================================

# 服务器配置
[server]
host = 0.0.0.0
port = 8888
max_connections = 1000
connection_timeout = 300

# 线程池配置
thread_pool.min_threads = 4
thread_pool.max_threads = 16
thread_pool.idle_time = 60000

# 心跳配置
heartbeat.interval = 30
heartbeat.timeout = 90

# =============================================================================
# 数据库配置
# =============================================================================

[database]
host = localhost
port = 3306
database = smartsched
username = root
password = root
min_connections = 2
max_connections = 10
connection_timeout = 30
auto_reconnect = true

# =============================================================================
# 加密配置
# =============================================================================

[crypto]
enabled = true
algorithm = AES-256-CBC
key_size = 256
iv_size = 128

# AES密钥（32字节十六进制，测试用，生产环境请使用安全的密钥管理）
# 默认密钥: 0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF
psk = 3031323334353637383941424344454630313233343536373839414243444566

# =============================================================================
# 业务配置
# =============================================================================

[business]
# 科室配置
department.default_capacity = 50
department.max_capacity = 100

# 排队配置
queue.call_timeout = 120
queue.recall_interval = 30
queue.skip_limit = 3

# 就诊配置
consultation.avg_duration = 300
consultation.max_duration = 1800

# B超配置
ultrasound.machine_count = 3
ultrasound.avg_duration = 600

# =============================================================================
# 日志配置
# =============================================================================

[logging]
level = info
output = both
console_level = warn
file = logs/server.log
file_level = info
max_file_size = 10485760
max_backup_files = 10

# =============================================================================
# 客户端默认配置
# =============================================================================

[client]
server_host = localhost
server_port = 8888
auto_reconnect = true
max_reconnect_attempts = 5
heartbeat_interval = 30
command_timeout = 30
